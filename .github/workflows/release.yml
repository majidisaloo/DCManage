name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WHMCS-ready package
        run: |
          set -euo pipefail
          mkdir -p dist/modules/addons
          cp -R modules/addons/dcmanage dist/modules/addons/dcmanage
          cd dist
          zip -r ../DCManage-${GITHUB_REF_NAME}.zip modules

      - name: Resolve release notes
        run: |
          set -euo pipefail
          NOTES_FILE="release-notes/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            cp "$NOTES_FILE" dist/RELEASE_BODY.md
          else
            {
              echo "Changed"
              echo "- Packaging updated for this release."
              echo "Added"
              echo "- No additional notes were provided for this tag."
              echo "Fixed"
              echo "- Stability and maintenance improvements."
            } > dist/RELEASE_BODY.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DCManage-${{ github.ref_name }}.zip
          body_path: dist/RELEASE_BODY.md
          generate_release_notes: false
          draft: false
          prerelease: false
