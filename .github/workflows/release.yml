name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build WHMCS-ready package
        run: |
          set -euo pipefail
          mkdir -p dist/modules/addons
          cp -R modules/addons/dcmanage dist/modules/addons/dcmanage
          cd dist
          zip -r ../DCManage-${GITHUB_REF_NAME}.zip modules

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            DCManage-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: false
          prerelease: false
