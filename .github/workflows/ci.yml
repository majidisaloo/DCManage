name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Lint module PHP files
        run: |
          set -euo pipefail
          find modules/addons/dcmanage -name '*.php' -print0 | xargs -0 -n1 php -l
